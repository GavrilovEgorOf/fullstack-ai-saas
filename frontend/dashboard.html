<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard — AI SaaS</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main>
    <h1>Workspace Dashboard</h1>
    <form id="login">
      <input id="email" placeholder="demo@team.com" />
      <input id="password" type="password" placeholder="demo1234" />
      <button type="submit">Login</button>
    </form>
    <pre id="out">Login to view usage and ask AI.</pre>
    <textarea id="question" placeholder="Ask about onboarding..."></textarea>
    <button id="ask">Ask AI</button>
  </main>
  <script src="/app.js"></script>
</body>
</html>
